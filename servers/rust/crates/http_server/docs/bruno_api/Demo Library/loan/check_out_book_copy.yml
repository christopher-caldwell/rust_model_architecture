      description: Loan created
      request:
          url: "{{BASE_URL}}/loans"
          method: POST
          body:
              type: json
              data: |-
                  {
                    "book_copy_barcode": "",
                    "member_ident": ""
                  }
      response:
          status: 201
          statusText: Created
          headers:
              - name: Content-Type
                value: application/json
          body:
              type: json
              data: |-
                  {
                    "dt_created": "",
                    "dt_due": "",
                    "dt_modified": "",
                    "dt_returned": "",
                    "ident": ""
                  }
    - name: 401 Response
      description: Unauthorized
