info:
    name: check_out_book_copy
    type: http
    seq: 1
    tags:
        - lending

http:
    method: POST
    url: "{{BASE_URL}}/loans"
    body:
        type: json
        data: |-
            {
              "book_copy_barcode": "",
              "member_ident": ""
            }
    auth: inherit

settings:
    encodeUrl: true
    timeout: 0
    followRedirects: true
    maxRedirects: 5

examples:
