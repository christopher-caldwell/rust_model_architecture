info:
    name: get_member_details
    type: http
    seq: 2
    tags:
        - membership

http:
    method: GET
    url: "{{BASE_URL}}/members/:ident"
    params:
        - name: ident
          value: ""
          type: path
          description: Identifier for the member
    auth: inherit

settings:
    encodeUrl: true
    timeout: 0
    followRedirects: true
    maxRedirects: 5

