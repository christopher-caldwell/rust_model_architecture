info:
    name: register_member
    type: http
    seq: 1
    tags:
        - membership

http:
    method: POST
    url: "{{BASE_URL}}/members"
    body:
        type: json
        data: |-
            {
              "full_name": "",
              "max_active_loans": 0
            }
    auth: inherit

settings:
    encodeUrl: true
    timeout: 0
    followRedirects: true
    maxRedirects: 5

examples:
    - name: 201 Response
      description: Member created
      request:
          url: "{{BASE_URL}}/members"
          method: POST
          body:
              type: json
              data: |-
                  {
                    "full_name": "",
                    "max_active_loans": 0
                  }
      response:
          status: 201
          statusText: Created
          headers:
              - name: Content-Type
                value: application/json
          body:
              type: json
              data: |-
                  {
                    "dt_created": "",
                    "dt_modified": "",
                    "full_name": "",
                    "ident": "",
                    "max_active_loans": 0,
                    "status": ""
                  }
    - name: 401 Response
      description: Unauthorized
      request:
          url: "{{BASE_URL}}/members"
          method: POST
          body:
              type: json
              data: |-
                  {
                    "full_name": "",
                    "max_active_loans": 0
                  }
      response:
          status: 401
          statusText: Unauthorized
          body:
              type: text
              data: ""
    - name: 403 Response
      description: Forbidden
      request:
          url: "{{BASE_URL}}/members"
          method: POST
          body:
              type: json
              data: |-
                  {
                    "full_name": "",
                    "max_active_loans": 0
                  }
      response:
          status: 403
          statusText: Forbidden
          body:
              type: text
              data: ""
    - name: 500 Response
      description: Internal server error
      request:
          url: "{{BASE_URL}}/members"
          method: POST
          body:
              type: json
              data: |-
                  {
                    "full_name": "",
                    "max_active_loans": 0
                  }
      response:
          status: 500
          statusText: Internal Server Error
          headers:
              - name: Content-Type
                value: application/json
          body:
              type: json
              data: |-
                  {
                    "error": ""
                  }
