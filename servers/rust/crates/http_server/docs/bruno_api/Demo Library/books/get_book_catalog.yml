info:
  name: get_book_catalog
  type: http
  seq: 9
  tags:
    - catalog

http:
  method: GET
  url: "{{BASE_URL}}/books"
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Book catalog
    request:
      url: "{{BASE_URL}}/books"
      method: GET
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          [
            {
              "author_name": "",
              "dt_created": "",
              "dt_modified": "",
              "isbn": "",
              "title": ""
            }
          ]
  - name: 401 Response
    description: Unauthorized
    request:
      url: "{{BASE_URL}}/books"
      method: GET
    response:
      status: 401
      statusText: Unauthorized
      body:
        type: text
        data: ""
  - name: 403 Response
    description: Forbidden
    request:
      url: "{{BASE_URL}}/books"
      method: GET
    response:
      status: 403
      statusText: Forbidden
      body:
        type: text
        data: ""
  - name: 500 Response
    description: Internal server error
    request:
      url: "{{BASE_URL}}/books"
      method: GET
    response:
      status: 500
      statusText: Internal Server Error
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "error": ""
          }
