info:
  name: Register Member
  type: graphql
  seq: 11

graphql:
  method: POST
  url: "{{BASE_URL}}/graphql"
  body:
    query: |-
      mutation RegisterMember($input: RegisterMemberInput!) {
        registerMember(input: $input) {
          memberNumber
          createdAt
          updatedAt
          status
          fullName
          maxActiveLoans
        }
      }
    variables: |-
      {
        "input": {
          "fullName": "Ada Lovelace",
          "maxActiveLoans": 3
        }
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
