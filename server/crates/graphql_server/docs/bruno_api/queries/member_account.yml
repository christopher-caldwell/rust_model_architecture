info:
  name: Member Account
  type: graphql
  seq: 10

graphql:
  method: POST
  url: "{{BASE_URL}}/graphql"
  body:
    query: |-
      query MemberAccount($memberNumber: String!) {
        memberAccount(memberNumber: $memberNumber) {
          memberNumber
          createdAt
          updatedAt
          status
          fullName
          maxActiveLoans
        }
      }
    variables: |-
      {
        "memberNumber": "Q1W2E3R4T5"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
