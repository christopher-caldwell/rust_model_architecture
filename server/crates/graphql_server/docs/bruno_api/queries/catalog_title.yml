info:
  name: Catalog Title
  type: graphql
  seq: 2

graphql:
  method: POST
  url: "{{BASE_URL}}/graphql"
  body:
    query: |-
      query CatalogTitle($isbn: String!) {
        catalogTitle(isbn: $isbn) {
          isbn
          createdAt
          updatedAt
          title
          authorName
        }
      }
    variables: |-
      {
        "isbn": "9780132350884"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
