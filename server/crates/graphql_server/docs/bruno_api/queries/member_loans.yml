info:
  name: Member Loans
  type: graphql
  seq: 14

graphql:
  method: POST
  url: "{{BASE_URL}}/graphql"
  body:
    query: |-
      query MemberLoans($memberNumber: String!) {
        memberLoans(memberNumber: $memberNumber) {
          loanNumber
          createdAt
          updatedAt
          dueAt
          returnedAt
        }
      }
    variables: |-
      {
        "memberNumber": "Q1W2E3R4T5"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
