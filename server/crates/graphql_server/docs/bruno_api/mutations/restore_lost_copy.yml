info:
  name: Restore Lost Copy
  type: graphql
  seq: 7

graphql:
  method: POST
  url: "{{BASE_URL}}/graphql"
  body:
    query: |-
      mutation RestoreLostCopy($barcode: String!) {
        restoreLostCopy(barcode: $barcode) {
          barcode
          createdAt
          updatedAt
          authorName
          status
        }
      }
    variables: |-
      {
        "barcode": "BC-9780132350884-001"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
