info:
  name: Add Inventory Copy
  type: graphql
  seq: 5

graphql:
  method: POST
  url: "{{BASE_URL}}/graphql"
  body:
    query: |-
      mutation AddInventoryCopy($input: AddInventoryCopyInput!) {
        addInventoryCopy(input: $input) {
          barcode
          createdAt
          updatedAt
          authorName
          status
        }
      }
    variables: |-
      {
        "input": {
          "isbn": "9780132350884",
          "barcode": "BC-9780132350884-001",
          "authorName": "Robert C. Martin"
        }
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
