info:
  name: Create Catalog Title
  type: graphql
  seq: 4

graphql:
  method: POST
  url: "{{BASE_URL}}/graphql"
  body:
    query: |-
      mutation CreateCatalogTitle($input: CreateCatalogTitleInput!) {
        createCatalogTitle(input: $input) {
          isbn
          createdAt
          updatedAt
          title
          authorName
        }
      }
    variables: |-
      {
        "input": {
          "isbn": "9780132350884",
          "title": "Clean Code",
          "authorName": "Robert C. Martin"
        }
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
